name: Build SQLite V4 Test Image

on:
  push:
    branches:
      - test-2.1.7-v4

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  VERSION: 2.1.7
  VERSION_HASH: a20e958

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend artifact
        uses: ./.github/actions/build-frontend
        with:
          artifact-name: komari-frontend

  build-linux-amd64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore frontend artifact
        uses: ./.github/actions/restore-frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Zig
        uses: ./.github/actions/setup-zig

      - name: Build Linux amd64 binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: zig cc -target x86_64-linux-musl
          GIN_MODE: release
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath \
            -ldflags="-s -w -X github.com/komari-monitor/komari/utils.CurrentVersion=${VERSION} -X github.com/komari-monitor/komari/utils.VersionHash=${VERSION_HASH}" \
            -o komari-linux-amd64

      - name: Upload Docker binary
        uses: actions/upload-artifact@v4
        with:
          name: komari-linux-amd64
          path: komari-linux-amd64

  build-and-push:
    needs: build-linux-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker binary
        uses: actions/download-artifact@v4
        with:
          name: komari-linux-amd64
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Linux amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          no-cache: true
          provenance: false

      - name: Verify image platform and embedded version
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${VERSION}"
          docker buildx imagetools inspect "$image"
          docker pull --platform linux/amd64 "$image"
          output="$(docker run --rm --platform linux/amd64 "$image" /app/komari version --json)"
          echo "$output"
          grep -F '"version":"2.1.7"' <<<"$output"
          grep -F '"hash":"a20e958"' <<<"$output"
