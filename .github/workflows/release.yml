name: Attach Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version-only release tag, for example 2.1.0
        required: true
        type: string
      version_hash:
        description: Seven-character version identifier
        required: true
        type: string
      web_ref:
        description: Branch or tag in nuomiiiii/komari-web
        required: true
        default: komari-2.1.0
        type: string

permissions:
  actions: write
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      version_hash: ${{ steps.validate.outputs.version_hash }}
      web_ref: ${{ steps.validate.outputs.web_ref }}
    steps:
      - name: Validate release metadata
        id: validate
        env:
          VERSION: ${{ inputs.tag }}
          VERSION_HASH: ${{ inputs.version_hash }}
          WEB_REF: ${{ inputs.web_ref }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION" >&2; exit 1; }
          [[ "$VERSION_HASH" =~ ^[A-Za-z0-9]{7}$ ]] || { echo "Invalid version identifier: $VERSION_HASH" >&2; exit 1; }
          [ -n "$WEB_REF" ] || { echo "Komari Web ref cannot be empty." >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_hash=$VERSION_HASH" >> "$GITHUB_OUTPUT"
          echo "web_ref=$WEB_REF" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend artifact
        uses: ./.github/actions/build-frontend
        with:
          ref: ${{ needs.prepare.outputs.web_ref }}
          artifact-name: komari-frontend

  build-and-attach-binaries:
    needs: [prepare, build-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            zig_target_triple: x86_64-windows-gnu
            binary_extension: .exe
          - goos: windows
            goarch: arm64
            zig_target_triple: aarch64-windows-gnu
            binary_extension: .exe
          - goos: windows
            goarch: 386
            zig_target_triple: x86-windows-gnu
            binary_extension: .exe
          - goos: linux
            goarch: amd64
            zig_target_triple: x86_64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: arm64
            zig_target_triple: aarch64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: 386
            zig_target_triple: x86-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: riscv64
            zig_target_triple: riscv64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: loong64
            zig_target_triple: loongarch64-linux-musl
            binary_extension: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore frontend artifact
        uses: ./.github/actions/restore-frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Zig cross-compiler toolchain
        uses: ./.github/actions/setup-zig

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: zig cc -target ${{ matrix.zig_target_triple }}
          GIN_MODE: release
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_HASH: ${{ needs.prepare.outputs.version_hash }}
        shell: bash
        run: |
          set -euo pipefail
          BINARY_NAME="komari-${GOOS}-${GOARCH}${{ matrix.binary_extension }}"
          go build -trimpath \
            -ldflags="-s -w -X github.com/komari-monitor/komari/utils.CurrentVersion=${VERSION} -X github.com/komari-monitor/komari/utils.VersionHash=${VERSION_HASH}" \
            -o "$BINARY_NAME"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari-${{ matrix.goos }}-${{ matrix.goarch }}
          path: komari-${{ matrix.goos }}-${{ matrix.goarch }}*

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          BINARY_NAME="komari-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }}"
          gh release upload "$VERSION" "$BINARY_NAME" --repo "$GITHUB_REPOSITORY" --clobber

  build-and-push-docker:
    needs: [prepare, build-and-attach-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker binaries
        uses: actions/download-artifact@v4
        with:
          pattern: komari-linux-*
          path: .
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether this is the latest GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.version }}
        run: |
          is_latest="$(gh api graphql \
            -f 'query=query($owner: String!, $name: String!, $tag: String!) { repository(owner: $owner, name: $name) { release(tagName: $tag) { isLatest } } }' \
            -F owner="${{ github.repository_owner }}" \
            -F name="${{ github.event.repository.name }}" \
            -F tag="$TAG" \
            --jq '.data.repository.release.isLatest')"
          echo "is_latest=$is_latest" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          provenance: false

      - name: Promote Docker latest tag
        if: steps.release.outputs.is_latest == 'true'
        env:
          TAG: ${{ needs.prepare.outputs.version }}
        run: docker buildx imagetools create --tag "${REGISTRY}/${IMAGE_NAME}:latest" "${REGISTRY}/${IMAGE_NAME}:${TAG}"

  publish-update-manifest:
    needs: [prepare, build-and-attach-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: komari-*-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and machine-readable update manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_HASH: ${{ needs.prepare.outputs.version_hash }}
        working-directory: release-assets
        shell: bash
        run: |
          set -euo pipefail
          sha256sum komari-* | sort -k2 > SHA256SUMS
          node <<'NODE'
          const crypto = require("crypto");
          const fs = require("fs");
          const files = fs.readdirSync(".")
            .filter((name) => /^komari-(windows|linux)-[A-Za-z0-9]+(?:\.exe)?$/.test(name))
            .sort();
          const assets = files.map((name) => {
            const match = name.match(/^komari-(windows|linux)-([A-Za-z0-9]+)(?:\.exe)?$/);
            const content = fs.readFileSync(name);
            return {
              name,
              os: match[1],
              arch: match[2],
              size: content.length,
              sha256: crypto.createHash("sha256").update(content).digest("hex"),
            };
          });
          fs.writeFileSync("komari-update.json", JSON.stringify({
            schema: 1,
            version: process.env.VERSION,
            version_hash: process.env.VERSION_HASH,
            assets,
          }, null, 2) + "\n");
          NODE

      - name: Upload update metadata to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: release-assets
        shell: bash
        run: gh release upload "$VERSION" SHA256SUMS komari-update.json --repo "$GITHUB_REPOSITORY" --clobber

  update-release-notes:
    needs: [prepare, build-and-push-docker, publish-update-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: gh workflow run generate-release-notes.yml --repo "$GITHUB_REPOSITORY" --ref main -f tag="$VERSION"
