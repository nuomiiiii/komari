name: Publish Stable Release

on:
  push:
    tags:
      - "2.0.2"

permissions:
  actions: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="2.0.2"
          if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "2.0.2 (27gd189)" \
              --generate-notes \
              --verify-tag
          fi

          DOCKER_VERSION="${TAG%%-*}"
          if docker manifest inspect "ghcr.io/${GITHUB_REPOSITORY}:${DOCKER_VERSION}" >/dev/null 2>&1; then
            echo "Docker image tag ${DOCKER_VERSION} already exists; no build dispatch needed."
            exit 0
          fi

          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${TAG}" \
            -f tag="${TAG}" \
            -f version_hash="27gd189"
