name: Publish Stable Release

on:
  push:
    tags:
      - "2.0.2-27gd189"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "2.0.2 (27gd189)" \
            --generate-notes \
            --verify-tag
