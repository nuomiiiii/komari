name: Rebuild Existing Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version-only GitHub Release tag, for example 2.1.3.
        required: true
        type: string
      version_hash:
        description: Optional seven-character identifier. Leave empty to generate one.
        required: false
        type: string
      server_ref:
        description: Server branch or tag to build.
        required: true
        default: main
        type: string
      frontend_ref:
        description: komari-web branch or tag to build.
        required: true
        default: komari-2.1.3
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: rebuild-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected server source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.server_ref }}
          fetch-depth: 0

      - name: Validate and prepare release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.release_tag }}
          REQUESTED_HASH: ${{ inputs.version_hash }}
          FRONTEND_REF: ${{ inputs.frontend_ref }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION" >&2; exit 1; }
          [ -n "$FRONTEND_REF" ] || { echo "Frontend ref cannot be empty." >&2; exit 1; }
          gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null

          VERSION_HASH="$REQUESTED_HASH"
          if [ -z "$VERSION_HASH" ]; then
            VERSION_HASH="$(node -e 'const c=require("crypto"),a="abcdefghijklmnopqrstuvwxyz0123456789";let s;do{s=Array.from(c.randomBytes(7),b=>a[b%a.length]).join("")}while(!/[a-z]/.test(s)||!/[0-9]/.test(s));process.stdout.write(s)')"
          fi
          [[ "$VERSION_HASH" =~ ^[A-Za-z0-9]{7}$ ]] || { echo "Invalid version identifier: $VERSION_HASH" >&2; exit 1; }

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_hash=$VERSION_HASH" >> "$GITHUB_OUTPUT"
          echo "frontend_ref=$FRONTEND_REF" >> "$GITHUB_OUTPUT"

      - name: Move version tag to selected source
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f "$VERSION" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$VERSION" --force

      - name: Update release build identifier
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          VERSION_HASH: ${{ steps.metadata.outputs.version_hash }}
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="$RUNNER_TEMP/release-body.md"
          gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" --json body --jq .body > "$BODY_FILE"
          BODY_FILE="$BODY_FILE" VERSION_HASH="$VERSION_HASH" node <<'NODE'
          const fs = require("fs");
          const path = process.env.BODY_FILE;
          const marker = `<!-- komari-version-hash: ${process.env.VERSION_HASH} -->`;
          const body = fs.readFileSync(path, "utf8");
          const pattern = /<!--\s*komari-version-hash:\s*[A-Za-z0-9]{7}\s*-->/i;
          fs.writeFileSync(path, pattern.test(body) ? body.replace(pattern, marker) : `${marker}\n\n${body}`);
          NODE
          gh release edit "$VERSION" --repo "$GITHUB_REPOSITORY" --title "$VERSION" --notes-file "$BODY_FILE"

      - name: Dispatch unified release build
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          VERSION_HASH: ${{ steps.metadata.outputs.version_hash }}
          FRONTEND_REF: ${{ steps.metadata.outputs.frontend_ref }}
          SERVER_REF: ${{ inputs.server_ref }}
        shell: bash
        run: |
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$SERVER_REF" \
            -f tag="$VERSION" \
            -f version_hash="$VERSION_HASH" \
            -f web_ref="$FRONTEND_REF"
