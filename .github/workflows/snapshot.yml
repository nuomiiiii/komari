name: Publish Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure snapshot target is main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Snapshot builds must run from refs/heads/main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

          git fetch --no-tags --depth=1 origin main
          MAIN_SHA="$(git rev-parse FETCH_HEAD)"

          if [ "${GITHUB_SHA}" != "${MAIN_SHA}" ]; then
            echo "Snapshot builds must use the current main commit."
            echo "Workflow SHA: ${GITHUB_SHA}"
            echo "Current main: ${MAIN_SHA}"
            exit 1
          fi

  prepare:
    needs: validate-ref
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate snapshot version
        id: version
        run: |
          # Snapshot 版本号格式: Snapshot-yymmddhhMM (UTC+8)
          VERSION="Snapshot-$(date -u -d '+8 hours' +%y%m%d%H%M)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: ${VERSION}"

  build-frontend:
    needs: validate-ref
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend artifact
        uses: ./.github/actions/build-frontend
        with:
          artifact-name: komari-frontend

  build-and-attach-binaries:
    needs: [prepare, build-frontend]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [windows, linux]
        goarch: [amd64, arm64, 386, riscv64]
        include:
          # Windows
          - goos: windows
            goarch: amd64
            zig_target_triple: x86_64-windows-gnu
            binary_extension: .exe
          - goos: windows
            goarch: arm64
            zig_target_triple: aarch64-windows-gnu
            binary_extension: .exe
          - goos: windows
            goarch: 386
            zig_target_triple: x86-windows-gnu
            binary_extension: .exe

          # Linux
          - goos: linux
            goarch: amd64
            zig_target_triple: x86_64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: arm64
            zig_target_triple: aarch64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: 386
            zig_target_triple: x86-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: riscv64
            zig_target_triple: riscv64-linux-musl
            binary_extension: ""
          - goos: linux
            goarch: loong64
            zig_target_triple: loongarch64-linux-musl
            binary_extension: ""

        exclude:
          - goos: windows
            goarch: riscv64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore frontend artifact
        uses: ./.github/actions/restore-frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Zig cross-compiler toolchain
        uses: ./.github/actions/setup-zig

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: zig cc -target ${{ matrix.zig_target_triple }}
          GIN_MODE: release
        run: |
          BINARY_NAME=komari-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.binary_extension }}" != "" ]; then
            BINARY_NAME=${BINARY_NAME}${{ matrix.binary_extension }}
          fi
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_HASH="${{ github.sha }}" # Use commit SHA for hash
          go build -trimpath -ldflags="-s -w -X github.com/komari-monitor/komari/utils.CurrentVersion=${VERSION} -X github.com/komari-monitor/komari/utils.VersionHash=${VERSION_HASH}" -o $BINARY_NAME

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari-${{ matrix.goos }}-${{ matrix.goarch }}
          path: komari-${{ matrix.goos }}-${{ matrix.goarch }}*

  publish-snapshot-release:
    needs: [prepare, build-and-attach-binaries]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure commit is still current main
        run: |
          git fetch --no-tags --depth=1 origin main
          MAIN_SHA="$(git rev-parse FETCH_HEAD)"

          if [ "${GITHUB_SHA}" != "${MAIN_SHA}" ]; then
            echo "Snapshot publish skipped because a newer main commit exists."
            echo "Workflow SHA: ${GITHUB_SHA}"
            echo "Current main: ${MAIN_SHA}"
            exit 1
          fi

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create snapshot prerelease and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          echo "Snapshot version: ${VERSION}"
          ls -alR artifacts

          # 如果同名 release/tag 已存在（例如重跑），先删除避免创建冲突
          if gh release view "${VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${VERSION} 已存在，正在删除以重新创建..."
            gh release delete "${VERSION}" --repo "${{ github.repository }}" --cleanup-tag --yes
          fi

          # 创建预发布并上传所有二进制文件
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${VERSION}" \
            --notes "Automated snapshot build (${VERSION}) from commit ${{ github.sha }}." \
            --prerelease \
            artifacts/komari-*

          gh workflow run generate-release-notes.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="${VERSION}"

          gh release list \
            --repo "${{ github.repository }}" \
            --limit 1000 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | startswith("Snapshot-"))) | .tagName' |
          while IFS= read -r tag; do
            if [ -z "${tag}" ] || [ "${tag}" = "${VERSION}" ]; then
              continue
            fi

            echo "Deleting old snapshot release ${tag}..."
            gh release delete "${tag}" --repo "${{ github.repository }}" --cleanup-tag --yes
          done
        shell: bash

  build-and-push-docker:
    needs: [prepare, build-and-attach-binaries, publish-snapshot-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure commit is still current main
        run: |
          git fetch --no-tags --depth=1 origin main
          MAIN_SHA="$(git rev-parse FETCH_HEAD)"

          if [ "${GITHUB_SHA}" != "${MAIN_SHA}" ]; then
            echo "Snapshot Docker publish skipped because a newer main commit exists."
            echo "Workflow SHA: ${GITHUB_SHA}"
            echo "Current main: ${MAIN_SHA}"
            exit 1
          fi

      - name: Download Docker binaries
        uses: actions/download-artifact@v4
        with:
          pattern: komari-linux-*
          path: .
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=snapshot

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          provenance: false
